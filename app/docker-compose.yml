version: '3.8'

services:
  crimewatch:
    build: .
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - LOG_LEVEL=INFO
      # Optional: Enable real data when ready
      # - USE_REAL_DATA=true
    volumes:
      # Mount logs directory for persistence
      - ./logs:/app/logs
      # Optional: Mount data directory for production
      # - ./data:/app/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Optional: Named volume for logs
volumes:
  crimewatch_logs: